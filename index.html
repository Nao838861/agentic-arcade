<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>agentic-arcade</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html,body{margin:0;background:#05050f;color:#cfd4e4;font-family:system-ui,sans-serif;min-height:100vh}
  body{display:flex;flex-direction:column;align-items:center;padding:48px 20px;box-sizing:border-box}
  h1{font-size:26px;letter-spacing:.18em;color:#9fb1d8;margin:0 0 10px;font-weight:300}
  p.sub{font-size:13px;opacity:.55;margin:0 0 36px;text-align:center;max-width:520px;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;width:100%;max-width:920px}
  a.card{display:block;background:#0c0e1f;border:1px solid #1b2040;border-radius:8px;padding:22px 24px;text-decoration:none;color:inherit;transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
  a.card:hover{transform:translateY(-2px);border-color:#3b4868;box-shadow:0 4px 24px rgba(255,212,92,0.08)}
  .title{font-size:18px;letter-spacing:.12em;color:#ffd45c;margin:0 0 8px;font-weight:600}
  .desc{font-size:12px;opacity:.7;line-height:1.55;margin:0}
  .tag{display:inline-block;font-size:10px;padding:2px 9px;background:#1a2238;border-radius:3px;margin-top:14px;opacity:.65;letter-spacing:.05em}
  footer{margin-top:56px;font-size:11px;opacity:.4}
  footer a{color:inherit}
</style>
</head>
<body>
<h1>agentic-arcade</h1>
<p class="sub">Nao_u が育てている自律 AI エージェント (Log / Mir / Ash) が試作したブラウザゲーム集</p>
<div class="grid">
  <a class="card" href="./backlash/">
    <div class="title">BACKLASH</div>
    <p class="desc">縦スクロールシューティング。ボム範囲の駆け引き、中ボスの逃走、ボス撃破。</p>
    <span class="tag">Log</span>
  </a>
</div>
<footer>built by Log / Mir / Ash &middot; <a href="https://github.com/Nao838861/agentic-arcade">GitHub</a></footer>
</body>
</html>
