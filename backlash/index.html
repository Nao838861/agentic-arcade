<html lang="ja">
<head>

<title>BACKLASH</title>
<style>
  html,body{margin:0;background:#05050f;color:#cfd4e4;font-family:system-ui,sans-serif;
            display:flex;flex-direction:column;align-items:center;min-height:100vh}

<body>
<h1>BACKLASH</h1>
<p>← → ↑ ↓ / WASD  MOVE &middot; SPACE  BOMB (gauge MAX) &middot; M  MUTE</p>
<canvas id="c" width="420" height="620"></canvas>
<script>
const W=420,H=620;
const RETRY_UNLOCK_FRAMES=240; // 4s lock after death — let player read final score
const AI_MODE=new URLSearchParams(location.search).has('ai');

// === SE (Web Audio + WAV files in SE/) ===
const AUDIO_ON=!AI_MODE;
const SE_FILES={
  start:       'ゲーム開始Spaceを押した.wav',
  shoot:       'push17.wav',                  // 仮: 短い punchy音 → ショットSE想定
  hitHard:     '硬い敵に撃ち込んだ時.wav',
  killSmall:   '敵小撃破.wav',
  killMed:     '敵中撃破.wav',
  killLarge:   '敵大撃破.wav',
  item:        'itenget.wav',                  // 短い版（頻繁取得向き）。長尺版は'アイテム取得.wav'
  levelUp:     'レベルアップ.wav',
  gaugeMax:    'ゲージ MAX .wav',
  bomb:        'ボム発動.wav',
  damage:      'プレイヤー被弾.wav',           // 生存時の被弾
  playerDeath: 'プレイヤー死亡.wav',           // 致命傷の瞬間
  gameOver:    'ゲームオーバー.wav',           // GAME OVER 表記出現時
  clear:       'ステージクリア.wav',
};
const SE_VOLUMES={
  start:0.7, shoot:0.10, hitHard:0.28,
  killSmall:0.45, killMed:0.55, killLarge:0.7,
  item:0.4, levelUp:0.65, gaugeMax:0.75,
  bomb:0.9, damage:0.7, playerDeath:0.8, gameOver:0.8, clear:0.9,
};
let audioCtx=null;
const seBuffers={};
const seLast={};
let muted=(function(){try{return localStorage.getItem('shotlog_muted')==='1';}catch(e){return false;}})();

async function initAudio(){
  if(!AUDIO_ON)return;
  try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){console.warn('audio unavailable',e);return;}
  await Promise.all(Object.entries(SE_FILES).map(async([key,fname])=>{
    try{
      const url='SE/'+encodeURIComponent(fname);
      const res=await fetch(url);
      const ab=await res.arrayBuffer();
      seBuffers[key]=await audioCtx.decodeAudioData(ab);
    }catch(e){console.warn('SE load failed',fname,e);}
  }));
}
initAudio();

// playSE(key) — fire SE; throttleMs prevents stacking when many fire same frame
function playSE(key,throttleMs){
  if(!AUDIO_ON||muted||!audioCtx)return;
  const buf=seBuffers[key];if(!buf)return;
  if(throttleMs){
    const now=performance.now();
    if(seLast[key]&&now-seLast[key]<throttleMs)return;
    seLast[key]=now;
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
  const src=audioCtx.createBufferSource();
  src.buffer=buf;
  const gain=audioCtx.createGain();
  gain.gain.value=SE_VOLUMES[key]??0.6;
  src.connect(gain).connect(audioCtx.destination);
  try{src.start(0);}catch(e){}
}
function toggleMute(){
  muted=!muted;
  try{localStorage.setItem('shotlog_muted',muted?'1':'0');}catch(e){}
}
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const keys={};

// === EXPERT AI POLICY — 17-dir eval + trajectory line dodge ===
function aiExpert(){
  const px=state.player.x,py=state.player.y,pr=state.player.r;
  let bomb=false;
  const SP=3.5;
  // 16 directions + stay
  const dirs=[[0,0]];
  for(let i=0;i<16;i++){const a=i*Math.PI*2/16;dirs.push([Math.cos(a),Math.sin(a)]);}
  let bestScore=-Infinity,bestDx=0,bestDy=0;

  // precompute bullet trajectory lines
  const bLines=[];
  for(const b of state.eBullets){
    if(b.dead)continue;
    const bs=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(bs<0.1)continue;
    bLines.push({x:b.x,y:b.y,dx:b.vx/bs,dy:b.vy/bs,vx:b.vx,vy:b.vy,r:b.r,spd:bs});
  }

  for(const [mx,my] of dirs){
    const nx=Math.max(14,Math.min(W-14,px+mx*SP));
    const ny=Math.max(60,Math.min(H-20,py+my*SP));
    let score=0;

    // bullet danger: distance to trajectory line + time-to-closest-approach
    for(const bl of bLines){
      // vector from bullet to candidate
      const tx=nx-bl.x,ty=ny-bl.y;
      // project onto bullet direction: time to closest approach
      const tProj=tx*bl.dx+ty*bl.dy;
      if(tProj<-10)continue; // bullet already past us
      // perpendicular distance to trajectory line
      const cross=Math.abs(tx*bl.dy-ty*bl.dx);
      const lineDist=cross; // distance to the line the bullet travels on
      // also check actual distance at closest approach time
      const frames=tProj/bl.spd;
      if(frames>30)continue; // too far in future
      const urgency=Math.max(0,1-frames/30);
      // penalty based on line distance
      if(lineDist<pr+bl.r+2)score-=1200*urgency;
      else if(lineDist<20)score-=600*urgency/(lineDist+1);
      else if(lineDist<40)score-=200*urgency/(lineDist+1);
      else if(lineDist<70)score-=40*urgency/(lineDist+1);
    }

    // enemy body danger
    for(const e of state.enemies){
      if(e.dead||e.done)continue;
      const er=(e.type==='large'||e.type==='boss')?e.r*(0.5+0.5*e.hp/e.maxHp):e.r;
      const d=Math.sqrt((e.x-nx)**2+(e.y-ny)**2);
      if(d<er+pr+3)score-=1500;
      else if(d<er+30)score-=500/(d+1);
      else if(d<er+60)score-=120/(d+1);
    }

    // item attraction
    const gaugeNeed=state.gauge<99?2.5:state.gauge<208?1:0.2;
    for(const it of state.items){
      if(it.dead)continue;
      const d=Math.sqrt((it.x-nx)**2+(it.y-ny)**2);
      if(d<250)score+=gaugeNeed*35/(d+10);
    }

    // positioning: center-bottom preferred, edges dangerous
    score-=Math.abs(nx-W/2)*0.02;
    if(ny<100)score-=50;
    if(nx<20||nx>W-20)score-=80;
    if(ny<65)score-=100;

    if(score>bestScore){bestScore=score;bestDx=mx;bestDy=my;}
  }

  // bomb: when in danger and gauge max
  if(state.gauge>=208){
    const near=state.eBullets.filter(b=>{
      if(b.dead)return false;
      const d=Math.sqrt((b.x-px)**2+(b.y-py)**2);return d<90;
    }).length;
    if(near>=3||state.eBullets.length>=12)bomb=true;
  }

  // convert continuous to discrete
  return {
    dx:bestDx>0.3?1:bestDx<-0.3?-1:0,
    dy:bestDy>0.3?1:bestDy<-0.3?-1:0,
    bomb
  };
}
addEventListener('keydown',e=>{
  // resume audio on first user gesture (autoplay policy)
  if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  if(e.key==='m'||e.key==='M'){toggleMute();return;}
  keys[e.key]=1;
  if(e.key===' '||e.code==='Space'||e.key.startsWith('Arrow'))e.preventDefault();
  if(e.key===' '&&!state.started){state.started=true;playSE('start');return;}
  if(e.key===' '&&(state.over||state.cleared)){
    // retry lock: prevent accidental skip before player can read the score
    if(state.over&&state.overTimer<RETRY_UNLOCK_FRAMES)return;
    const isNewHi=state.score>=hiScore&&state.score>0;
    if(!state.submitted&&isNewHi)return; // must enter name for high score
    if(!state.submitted&&!isNewHi){reset();state.started=true;playSE('start');return;} // quick retry
    if(!rankLoaded&&!rankSaving)rankLoaded=true;
    if(rankLoaded){reset();state.started=true;playSE('start');}
    return;
  }
});
addEventListener('keyup',e=>{keys[e.key]=0;});
function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}}

// === ENEMY TYPES ===
const ETYPES={
  small:  {hp:1,r:9, nRad:2,nAim:0,dropRate:0.3,color:'#ff6080'},
  medium: {hp:1,r:13,nRad:3,nAim:1,dropRate:0.6,color:'#ff8040'},
  large:  {hp:12,r:39,nRad:8,nAim:0,dropRate:1.0,color:'#2dd4bf'},
  boss:   {hp:60,r:57,nRad:10,nAim:4,dropRate:1.0,color:'#ff40c0'},
};

// === PATH PATTERNS ===
function pTopDown(x,endY){
  // no pause — smooth descent then exit, no stacking
  return [{x,y:-15,t:0},{x,y:endY,t:140},{x,y:H+20,t:160}];
}
function pLineDown(x,endY,n,gap){
  // stagger endY so enemies don't overlap
  return Array.from({length:n},(_,i)=>({path:pTopDown(x,endY-i*14),delay:i*gap}));
}
function pVForm(cx,sp,endY){
  const p=[];
  for(let i=-2;i<=2;i++){
    const x=cx+i*sp;
    p.push({path:[{x,y:-15,t:0},{x,y:endY,t:150},{x:x+Math.sign(i||1)*80,y:-30,t:140}],delay:Math.abs(i)*10});
  }
  return p;
}
function pSideEntry(left,cy){
  const x0=left?-15:W+15,x1=left?W*0.6:W*0.4,x2=left?W+15:-15;
  return [{x:x0,y:cy-30,t:0},{x:x1,y:cy,t:110},{x:x2,y:cy-30,t:110}];
}
function pSideSweep(left,y,n){
  return Array.from({length:n},(_,i)=>({path:pSideEntry(left,y+i*8),delay:i*10}));
}
function pDive(x,ty){
  return [{x,y:-15,t:0},{x,y:ty,t:100},{x,y:ty-30,t:40},{x:x+(x>W/2?100:-100),y:-30,t:110}];
}
function pLarge(x){
  // descend → short hover → flee back upward (escape if not killed in time)
  return [{x,y:-25,t:0},{x,y:200,t:160},{x,y:200,t:80},{x,y:-40,t:140}];
}
function pBoss(x){
  // descend to y=140, stay for long time (shoot during stay), then slowly exit
  return [{x,y:-35,t:0},{x,y:140,t:180},{x,y:140,t:800},{x,y:-40,t:200}];
}

// === WAVE BUILDER ===
function buildWaves(){
  const W_=[];let t=0;
  const s=(arr,type,extraDelay)=>arr.map(e=>({...e,type,delay:(e.delay||0)+(extraDelay||0)}));

  // -- PHASE 1: small swarm --
  // W1: single center column first — gentle intro
  W_.push({t,enemies:[
    ...s(pLineDown(210,355,6,10),'small'),
  ]});
  t+=120;
  // W1b: then wider columns
  W_.push({t,enemies:[
    ...s(pLineDown(80,360,6,8),'small'),
    ...s(pLineDown(210,350,6,8),'small',4),
    ...s(pLineDown(340,360,6,8),'small',8),
  ]});
  t+=160;
  // W2: 20 left sweep
  W_.push({t,enemies:s(pSideSweep(true,190,20),'small')});
  t+=140;
  // W3: 20 right sweep
  W_.push({t,enemies:s(pSideSweep(false,260,20),'small')});
  t+=160;
  // W4: triple V (15) + columns (18) = 33
  W_.push({t,enemies:[
    ...s(pVForm(W/2,30,280),'small'),
    ...s(pVForm(W/2-90,25,310),'small',20),
    ...s(pVForm(W/2+90,25,310),'small',20),
    ...s(pLineDown(80,370,6,10),'small',50),
    ...s(pLineDown(210,360,6,10),'small',55),
    ...s(pLineDown(340,370,6,10),'small',50),
  ]});
  t+=250;

  // -- PHASE 2: medium intro --
  // W5: divers 16 alternating
  W_.push({t,enemies:Array.from({length:16},(_,i)=>({
    path:pDive(40+i*24,390+i%3*8),type:'small',t:i*10,
  }))});
  t+=180;
  // W6: left medium + right small (36)
  W_.push({t,enemies:[
    ...s(pSideSweep(true,160,12),'medium'),
    ...s(pSideSweep(false,300,12),'small',30),
    ...s(pLineDown(W/2,350,12,8),'small',60),
  ]});
  t+=260;
  // W7: medium key wave + large debut
  W_.push({t,enemies:[
    {path:pLarge(W/2),type:'large',t:0},
    ...s(pSideSweep(true,170,6),'medium',20),
    ...s(pSideSweep(false,280,6),'medium',50),
    ...s(pLineDown(70,360,10,7),'small',10),
    ...s(pLineDown(350,360,10,7),'small',15),
  ]});
  t+=280;

  // -- PHASE 3: large intro --
  // W8: large pair + small columns (40+)
  W_.push({t,enemies:[
    {path:pLarge(130),type:'large',t:0},
    {path:pLarge(290),type:'large',t:20},
    ...s(pLineDown(50,350,8,8),'small',10),
    ...s(pLineDown(210,340,8,8),'small',15),
    ...s(pLineDown(370,350,8,8),'small',10),
    ...s(pSideSweep(true,380,8),'medium',80),
  ]});
  t+=330;
  // W9: V + side + divers + large flankers
  W_.push({t,enemies:[
    {path:pLarge(100),type:'large',t:0},
    {path:pLarge(320),type:'large',t:30},
    ...s(pVForm(W/2,35,290),'small',10),
    ...s(pVForm(W/2,35,290),'small',60),
    ...Array.from({length:10},(_,i)=>({path:pDive(40+i*40,400),type:'small',t:80+i*10})),
    ...s(pSideSweep(true,340,8),'medium',120),
    ...s(pSideSweep(false,200,8),'small',130),
  ]});
  t+=330;
  // W10: large + medium swarm (35+)
  W_.push({t,enemies:[
    {path:pLarge(W/2),type:'large',t:0},
    ...s(pSideSweep(true,170,10),'medium',20),
    ...s(pSideSweep(false,330,10),'medium',40),
    ...s(pLineDown(W/2-80,360,8,8),'small',60),
    ...s(pLineDown(W/2+80,360,8,8),'small',65),
  ]});
  t+=320;

  // -- PHASE 4: boss --
  // W11: BOSS + large + small swarm during boss stay
  W_.push({t,enemies:[
    {path:pBoss(W/2),type:'boss',t:0},
    {path:pLarge(100),type:'large',t:150},
    {path:pLarge(320),type:'large',t:300},
    // small waves during boss fight
    ...s(pLineDown(60,370,8,8),'small',200),
    ...s(pLineDown(360,370,8,8),'small',205),
    ...s(pSideSweep(true,300,10),'small',280),
    ...s(pSideSweep(false,200,10),'small',320),
    ...s(pSideSweep(true,250,6),'medium',380),
    // more small from top during late boss fight
    ...s(pLineDown(140,350,8,8),'small',400),
    ...s(pLineDown(280,350,8,8),'small',405),
  ]});
  t+=500;

  // -- PHASE 5: climax --
  // W12: 2 large + massive swarm
  W_.push({t,enemies:[
    {path:pLarge(120),type:'large',t:0},
    {path:pLarge(300),type:'large',t:20},
    ...s(pLineDown(50,360,10,7),'small'),
    ...s(pLineDown(150,350,10,7),'small',5),
    ...s(pLineDown(270,350,10,7),'small',5),
    ...s(pLineDown(370,360,10,7),'small'),
    ...s(pSideSweep(true,200,12),'medium',80),
    ...s(pSideSweep(false,350,12),'medium',100),
  ]});
  t+=300;
  // W13: BOSS + large + everything
  W_.push({t,enemies:[
    {path:pBoss(W/2-80),type:'boss',t:0},
    {path:pLarge(W/2+100),type:'large',t:60},
    ...s(pSideSweep(true,160,16),'small',100),
    ...s(pSideSweep(false,320,16),'small',120),
    ...s(pSideSweep(true,280,8),'medium',250),
    ...s(pLineDown(W/2,350,10,7),'small',300),
    ...Array.from({length:8},(_,i)=>({path:pDive(40+i*48,400),type:'small',t:350+i*12})),
  ]});
  return W_;
}

// scoring constants
const SCORE_ENEMY={small:10,medium:50,large:500,boss:1000};
const SCORE_ITEM=[20,50,100]; // lv1,lv2,lv3
const BOMB_MULTI_SM=10; // small/medium bomb kill multiplier
const BOMB_MULTI_LB=2; // large/boss bomb kill multiplier
const BOMB_BULLET_PTS=30;

let hiScore=parseInt(localStorage.getItem('backlash_hi'))||0;
let state;
function reset(){
  const seed=Date.now()&0xFFFFFFFF;
  state={
    seed,rng:mulberry32(seed),t:0,
    player:{x:W/2,y:H-60,r:10},
    bullets:[],enemies:[],eBullets:[],items:[],
    cooldown:0,gauge:0,score:0,
    waves:buildWaves(),waveIdx:0,waveT:0,
    over:false,cleared:false,started:false,
    hitFlash:0,bombFlash:0,bombReady:0,bombUsed:false,invincible:0,mercyGlow:0,maxFlash:0,maxFlashed:false,retryShownT:undefined,gameOverSEPlayed:false,
    particles:[],popups:[],rings:[],hitstop:0,shake:0,particleFreeze:0,overTimer:0,submitted:false,nameInput:'',nameEditing:false,
    stars:Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,layer:Math.floor(Math.random()*6)})),
  };
}
function addScore(pts){state.score+=pts;}
const RANK_URL='https://script.google.com/macros/s/AKfycbyEFcZ8LetVY6uprb5kS8et2Q-l2SnEqx9XU48TX-GihvSE6Z4WhsBD3DFFpTZgVyNxQg/exec';
let rankData=null,rankName=localStorage.getItem('backlash_name')||'';
let playerId=localStorage.getItem('backlash_pid');
if(!playerId){try{playerId=crypto.randomUUID();}catch(e){playerId='p'+Date.now()+Math.random().toString(36).slice(2);}localStorage.setItem('backlash_pid',playerId);}
function saveHi(){
  if(state.score>hiScore){hiScore=state.score;localStorage.setItem('backlash_hi',''+hiScore);}
}
let rankSaving=false,rankLoaded=false;
function submitScore(name,score){
  localStorage.setItem('backlash_name',name);
  rankName=name;
  rankSaving=true;rankLoaded=false;rankData=null;
  fetch(RANK_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({name:name,score:score,pid:playerId})})
    .then(()=>{setTimeout(()=>{fetchRanking(true);},1500);})
    .catch(e=>{console.log('submit err',e);rankSaving=false;rankLoaded=true;});
  // timeout: force finish after 8s
  setTimeout(()=>{if(rankSaving){rankSaving=false;rankLoaded=true;}},8000);
}
function fetchRanking(afterSubmit){
  fetch(RANK_URL,{redirect:'follow'})
    .then(r=>r.text())
    .then(t=>{try{rankData=JSON.parse(t);}catch(e){console.log('parse err',t.slice(0,200));}
      if(afterSubmit){rankSaving=false;rankLoaded=true;}})
    .catch(e=>{console.log('rank err',e);if(afterSubmit){rankSaving=false;rankLoaded=true;}});
}
fetchRanking(false);
reset();
if(AI_MODE)state.started=true;

function shoot(){
  const px=state.player.x,py=state.player.y;
  const lvl=state.gauge>=99?3:state.gauge>=35?2:1;
  if(lvl===1){
    state.bullets.push({x:px,y:py-12,vx:0,vy:-7});
  }else if(lvl===2){
    state.bullets.push({x:px-6,y:py-12,vx:0,vy:-7});
    state.bullets.push({x:px+6,y:py-12,vx:0,vy:-7});
  }else{
    state.bullets.push({x:px,y:py-12,vx:0,vy:-7});
    state.bullets.push({x:px-8,y:py-10,vx:-1.4,vy:-6.8});
    state.bullets.push({x:px+8,y:py-10,vx:1.4,vy:-6.8});
  }
  state.cooldown=lvl===3?6:lvl===2?7:8;
  playSE('shoot');
}

function spawnWaveEnemy(def){
  const cfg=ETYPES[def.type];
  const path=def.path;
  return {path,pathIdx:0,pathT:0,
    x:path[0].x,y:path[0].y,
    hp:cfg.hp,maxHp:cfg.hp,r:cfg.r,type:def.type,
    nRad:cfg.nRad,nAim:cfg.nAim,dropRate:cfg.dropRate,
    color:cfg.color,flash:0,shotCd:0};
}

// MERCY: when player is close at the moment of kill, counter-attack bullets
// are nudged out of the cone aimed at the player. Tier by enemy strength:
//   small  → full mercy, generous range (per Nao_u 2026-04-26 feedback: child playtest)
//   medium → aim bullets become perpendicular instead of homing (mild)
//   large/boss → no mercy (ranged threats by design)
const MERCY_SMALL_RANGE_SQ=170*170;       // generous radius for the weakest enemy
const MERCY_SMALL_SAFE=Math.PI/3;         // ±60° safe cone in front of player
const MERCY_MED_RANGE_SQ=85*85;           // tighter radius for medium aim mute
const BOMB_MERCY_RANGE_SQ=250*250;        // bomb-kill: divert player-aimed bullets within range
function spawnRevenge(x,y,nRad,nAim,type,bombKill){
  const dx=state.player.x-x,dy=state.player.y-y;
  const distSq=dx*dx+dy*dy;
  const playerAng=Math.atan2(dy,dx);
  const smallMercy=(type==='small'&&distSq<MERCY_SMALL_RANGE_SQ);
  const medAimMute=(type==='medium'&&distSq<MERCY_MED_RANGE_SQ);
  const bombMercy=(bombKill&&distSq<BOMB_MERCY_RANGE_SQ);
  const divertCone=smallMercy||bombMercy;
  const muteAim=medAimMute||bombMercy;
  // large: pretty bigger warm-red bullets; not aimed (already nAim=0)
  const isLarge=type==='large';
  const radSpd=3.5;
  const radR=isLarge?5:3;
  const radKind=isLarge?'large':undefined;
  if(smallMercy||medAimMute||bombMercy){
    spawnRing(x,y,'#7fdfff',26,18); // cyan: mercy triggered
    state.mercyGlow=Math.max(state.mercyGlow||0,18);
  }
  const base=state.rng()*Math.PI*2;
  for(let i=0;i<nRad;i++){
    let a=base+i*(Math.PI*2/nRad);
    if(divertCone){
      // push bullet angle outside ±MERCY_SMALL_SAFE of the player direction
      const diff=Math.atan2(Math.sin(a-playerAng),Math.cos(a-playerAng));
      if(Math.abs(diff)<MERCY_SMALL_SAFE){
        a=playerAng+(diff>=0?MERCY_SMALL_SAFE:-MERCY_SMALL_SAFE);
      }
    }
    state.eBullets.push({x,y,vx:Math.cos(a)*radSpd,vy:Math.sin(a)*radSpd,r:radR,kind:radKind});
  }
  if(muteAim){
    // sideways spread (perpendicular to player) instead of aimed shots
    const perp=playerAng+Math.PI/2;
    for(let i=0;i<nAim;i++){
      const a=perp+(i-((nAim-1)/2))*0.30;
      state.eBullets.push({x,y,vx:Math.cos(a)*3.0,vy:Math.sin(a)*3.0,r:3});
    }
  }else{
    for(let i=0;i<nAim;i++){
      const adx=state.player.x-x,ady=state.player.y-y;
      const spread=(i-((nAim-1)/2))*0.25;
      const a=Math.atan2(ady,adx)+spread;
      state.eBullets.push({x,y,vx:Math.cos(a)*3.0,vy:Math.sin(a)*3.0,r:3});
    }
  }
}

function moveEnemy(e){
  if(e.pathIdx>=e.path.length-1){e.done=true;return;}
  const p0=e.path[e.pathIdx],p1=e.path[e.pathIdx+1];
  const dur=p1.t||1;
  e.pathT++;
  const frac=Math.min(1,e.pathT/dur);
  const sf=frac*frac*(3-2*frac);
  e.x=p0.x+(p1.x-p0.x)*sf;
  e.y=p0.y+(p1.y-p0.y)*sf;
  if(e.pathT>=dur){e.pathIdx++;e.pathT=0;}
  // large: slow drift + geometric radial bursts (spectacle, NOT aimed)
  if(e.type==='large'&&e.y>20&&e.y<H-20){
    const dx=state.player.x-e.x;
    e.x+=Math.sign(dx)*Math.min(Math.abs(dx),0.4);
    e.x=Math.max(e.r,Math.min(W-e.r,e.x));
    e.shotCd=(e.shotCd||80)-1;
    if(e.shotCd<=0){
      e.shotN=(e.shotN||0)+1;
      const N=12;
      const baseAng=e.shotN*0.13; // gentle rotation each volley
      for(let i=0;i<N;i++){
        const a=baseAng+i*Math.PI*2/N;
        state.eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2.8,vy:Math.sin(a)*2.8,r:5,kind:'large'});
      }
      e.shotCd=80;
    }
  }
  // boss: slow horizontal sway + alternating attack patterns
  if(e.type==='boss'&&e.y>40&&e.y<H-40){
    // sway left-right
    e.x+=Math.sin(state.t*0.015)*0.8;
    e.x=Math.max(e.r+10,Math.min(W-e.r-10,e.x));
    e.shotCd=(e.shotCd||0)-1;
    if(e.shotCd<=0){
      e.shotPattern=(e.shotPattern||0)+1;
      if(e.shotPattern%3!==0){
        // aimed 5-way burst
        const dx=state.player.x-e.x,dy=state.player.y-e.y;
        const a=Math.atan2(dy,dx);
        for(let i=-2;i<=2;i++){
          state.eBullets.push({x:e.x,y:e.y,vx:Math.cos(a+i*0.18)*2.5,vy:Math.sin(a+i*0.18)*2.5,r:4});
        }
      }else{
        // radial burst — 12 directions
        for(let i=0;i<12;i++){
          const a=i*(Math.PI*2/12)+(e.shotPattern*0.3);
          state.eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*2.0,vy:Math.sin(a)*2.0,r:4});
        }
      }
      e.shotCd=35;
    }
  }
}

function spawnParticles(x,y,count,color,speed){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=speed*(0.5+Math.random());
    state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25+Math.random()*25,color});
  }
}
function spawnRing(x,y,color,maxR,life){
  state.rings.push({x,y,color,r:0,maxR:maxR||40,life:life||20,maxLife:life||20});
}
function shake(amount){if(amount>state.shake)state.shake=amount;}

function step(){
  // always update stars; particles freeze during particleFreeze
  if(state.particleFreeze>0)state.particleFreeze--;
  else{
    state.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.97;p.vy*=0.97;});
    state.particles=state.particles.filter(p=>p.life>0);
  }
  state.popups.forEach(p=>{p.y-=1.2;p.life--;});
  state.popups=state.popups.filter(p=>p.life>0);
  state.rings.forEach(r=>{r.r+=(r.maxR-r.r)*0.18;r.life--;});
  state.rings=state.rings.filter(r=>r.life>0);
  if(state.shake>0)state.shake*=0.82;
  if(state.mercyGlow>0)state.mercyGlow--;
  const starSpeeds=[0.15,0.3,0.6,1.2,2.5,4.5];
  state.stars.forEach(s=>{s.y+=starSpeeds[s.layer];if(s.y>H){s.y=-2;s.x=Math.random()*W;}});
  if(state.hitstop>0){
    // game over: after 5F of particle spread, freeze particles for remaining stop
    if(state.over&&state.hitstop===34)state.particleFreeze=30;
    state.hitstop--;draw();return;
  }
  if(!state.started){draw();return;}
  if(state.cleared){state.t++;draw();return;}  // tick t so retry/saving animations advance
  if(state.over){
    // after hitstop, normal movement continues (no spawning, no collision)
    state.t++;state.overTimer++;
    // GAME OVER 表記が出るタイミング(overTimer>=120)で一度だけ gameOver SE
    if(!state.gameOverSEPlayed&&state.overTimer>=120){
      state.gameOverSEPlayed=true;
      playSE('gameOver');
    }
    if(state.hitFlash>0)state.hitFlash--;
    state.enemies.forEach(e=>{moveEnemy(e);});
    state.enemies=state.enemies.filter(e=>!e.done&&!e.dead);
    state.eBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
    state.eBullets=state.eBullets.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
    state.bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
    state.bullets=state.bullets.filter(b=>b.y>-10);
    state.items.forEach(it=>{it.y+=it.vy;});
    draw();return;
  }
  state.t++;
  state.waveT++;
  // player — AI or human
  let pdx=0,pdy=0,aiBomb=false;
  if(AI_MODE){
    const ai=aiExpert();
    pdx=ai.dx;pdy=ai.dy;aiBomb=ai.bomb;
  }else{
    if(keys['ArrowLeft']||keys['a']||keys['4'])pdx-=1;
    if(keys['ArrowRight']||keys['d']||keys['6'])pdx+=1;
    if(keys['ArrowUp']||keys['w']||keys['8'])pdy-=1;
    if(keys['ArrowDown']||keys['s']||keys['2'])pdy+=1;
  }
  if(pdx!==0&&pdy!==0){pdx*=0.707;pdy*=0.707;}
  const sp=3.5;
  state.player.x+=pdx*sp;state.player.y+=pdy*sp;
  state.player.x=Math.max(14,Math.min(W-14,state.player.x));
  state.player.y=Math.max(60,Math.min(H-20,state.player.y));
  // auto-shoot
  if(state.cooldown>0)state.cooldown--;
  if(state.cooldown<=0)shoot();
  // BOMB: gauge max + space
  // detect first MAX reach → show bomb ready notification
  if(state.gauge>=208&&state.bombReady<=0&&!state.bombUsed)state.bombReady=180;
  if(state.bombReady>0)state.bombReady--;
  // detect MAX gauge transition (every refill) → yellow energy concentration + tiny flash
  if(state.gauge>=208){
    if(!state.maxFlashed){
      state.maxFlashed=true;
      state.maxFlash=18;
      playSE('gaugeMax');
      state.hitstop=Math.max(state.hitstop,3); // ごく短い punctuation
      spawnRing(state.player.x,state.player.y,'#ffd45c',56,22);
      spawnRing(state.player.x,state.player.y,'#fff8d0',36,16);
      for(let i=0;i<22;i++){
        const a=i*(Math.PI*2/22)+Math.random()*0.25;
        const r0=68+Math.random()*22;
        const sp=2.4+Math.random()*1.4;
        state.particles.push({
          x:state.player.x+Math.cos(a)*r0,
          y:state.player.y+Math.sin(a)*r0,
          vx:-Math.cos(a)*sp,vy:-Math.sin(a)*sp,
          life:26,color:'#ffe066'
        });
      }
    }
  }else{
    state.maxFlashed=false;
  }
  if(state.maxFlash>0)state.maxFlash--;
  if((keys[' ']||aiBomb)&&state.gauge>=208&&state.bombFlash<=0){
    state.bombUsed=true;state.bombReady=0;
    state.gauge=35; // drop to 2way start
    state.bombFlash=30;
    playSE('bomb');
    shake(10);
    state.hitstop=Math.max(state.hitstop,2); // ごく短いパンチのみ
    // visual rings (unchanged)
    const visR=W*0.7;
    spawnRing(state.player.x,state.player.y,'#ffd45c',visR,40);
    spawnRing(state.player.x,state.player.y,'#fff',W*0.5,28);
    // effect range = 1.3× the outer visible ring (slight grace beyond what you see)
    const BOMB_R=visR*1.3, BOMB_R_SQ=BOMB_R*BOMB_R;
    const px=state.player.x, py=state.player.y;
    // partition bullets: in-range cleared, out-of-range survive
    const cleared=[], surviving=[];
    for(const b of state.eBullets){
      const dx=b.x-px, dy=b.y-py;
      (dx*dx+dy*dy<=BOMB_R_SQ?cleared:surviving).push(b);
    }
    const bombBulletScore=cleared.length*BOMB_BULLET_PTS;
    if(bombBulletScore>0){
      addScore(bombBulletScore);
      state.popups.push({x:W/2,y:H/2-30,text:'+'+bombBulletScore+' BOMB',life:60,color:'#ffd45c',size:20});
    }
    for(const b of cleared){
      for(let i=0;i<6;i++){
        const a=Math.random()*Math.PI*2;
        const sp=1.4+Math.random()*1.8;
        state.particles.push({x:b.x,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:9+Math.random()*7,color:'#fff0d0'});
      }
    }
    state.eBullets=surviving;
    // damage enemies in range only: small/medium die, large/boss lose half hp
    state.enemies.forEach(e=>{
      if(e.dead)return;
      const dx=e.x-px, dy=e.y-py;
      if(dx*dx+dy*dy>BOMB_R_SQ)return;
      const dmg=e.type==='boss'?Math.ceil(e.maxHp/2):e.type==='large'?Math.ceil(e.maxHp/2):e.maxHp;
      e.hp-=dmg;
      if(e.hp<=0){
        e.dead=true;const bmul=(e.type==='small'||e.type==='medium')?BOMB_MULTI_SM:BOMB_MULTI_LB;
        const bepts=(SCORE_ENEMY[e.type]||10)*bmul;addScore(bepts);
        if(e.type==='large'||e.type==='boss')state.popups.push({x:e.x,y:e.y-e.r-5,text:'+'+bepts,life:50,color:e.type==='boss'?'#ffb0e8':'#9ff0e0',size:e.type==='boss'?18:15});
        // bomb kill: revenge with mercy diversion within BOMB_MERCY_RANGE
        spawnRevenge(e.x,e.y,e.nRad,e.nAim,e.type,true);
        if(state.rng()<e.dropRate){
          const n=e.type==='boss'?5:e.type==='large'?3:1;
          for(let ii=0;ii<n;ii++)state.items.push({x:e.x+(ii-(n-1)/2)*15,y:e.y,vy:1.2});
        }
      }
      e.flash=10;
    });
  }
  if(state.bombFlash>0)state.bombFlash--;
  // bullets
  state.bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  state.bullets=state.bullets.filter(b=>b.y>-10&&b.x>-10&&b.x<W+10);
  // wave spawning
  while(state.waveIdx<state.waves.length){
    const w=state.waves[state.waveIdx];
    if(state.waveT<w.t)break;
    for(const ed of w.enemies){
      const spawnAt=w.t+(ed.delay||ed.t||0);
      if(state.waveT===spawnAt)state.enemies.push(spawnWaveEnemy(ed));
    }
    const maxD=Math.max(...w.enemies.map(e=>e.delay||e.t||0));
    if(state.waveT>=w.t+maxD){state.waveIdx++;}else break;
  }
  if(state.waveIdx>=state.waves.length&&state.enemies.length===0&&state.eBullets.length===0&&!state.cleared){
    state.cleared=true;saveHi();playSE('clear');
  }
  // enemies
  state.enemies.forEach(e=>{moveEnemy(e);if(e.flash>0)e.flash--;});
  state.enemies=state.enemies.filter(e=>!e.done&&!e.dead);
  // hit detection
  for(const e of state.enemies){
    if(e.dead)continue;
    for(const b of state.bullets){
      if(b.dead)continue;
      const er=(e.type==='large'||e.type==='boss')?e.r*(0.5+0.5*e.hp/e.maxHp):e.r;
      const dx=b.x-e.x,dy=b.y-e.y;
      if(dx*dx+dy*dy<(er+3)*(er+3)){
        b.dead=true;e.hp--;e.flash=6;
        if(e.hp<=0){
          e.dead=true;const epts=SCORE_ENEMY[e.type]||10;addScore(epts);
          if(e.type==='large'||e.type==='boss')state.popups.push({x:e.x,y:e.y-e.r-5,text:'+'+epts,life:50,color:e.type==='boss'?'#ffb0e8':'#9ff0e0',size:e.type==='boss'?18:15});
          spawnRevenge(e.x,e.y,e.nRad,e.nAim,e.type);
          // SE: kill-by-type (boss reuses killLarge for now)
          if(e.type==='small')playSE('killSmall',20);
          else if(e.type==='medium')playSE('killMed',20);
          else if(e.type==='large')playSE('killLarge');
          else if(e.type==='boss')playSE('killLarge');
          // visual feedback by enemy size
          if(e.type==='small'){
            // Nao_u 2026-04-26: 打ち返し弾(赤)と同系統色で爆発が紛れる問題
            // → 暗色・色相変更(青灰)・短寿命・パーティクル数も削減
            spawnRing(e.x,e.y,'#4a5468',18,8);
            spawnParticles(e.x,e.y,5,'#6a7488',2.2);
          }else if(e.type==='medium'){
            spawnRing(e.x,e.y,'#5a6478',26,11);
            spawnParticles(e.x,e.y,9,'#7a8498',3);
            shake(2);
          }else if(e.type==='large'){
            spawnRing(e.x,e.y,'#5eead4',72,30);
            spawnRing(e.x,e.y,'#fff',46,18);
            spawnParticles(e.x,e.y,48,'#7eecd4',6);
            spawnParticles(e.x,e.y,24,'#fff',8);
            shake(7);state.hitstop=Math.max(state.hitstop,6);
          }else if(e.type==='boss'){
            spawnRing(e.x,e.y,'#ff60d0',140,42);
            spawnRing(e.x,e.y,'#ffd45c',90,30);
            spawnRing(e.x,e.y,'#fff',56,20);
            spawnParticles(e.x,e.y,100,'#ffaae0',11);
            spawnParticles(e.x,e.y,70,'#ffd45c',9);
            spawnParticles(e.x,e.y,46,'#fff',13);
            shake(16);state.hitstop=Math.max(state.hitstop,18);
          }
          if(state.rng()<e.dropRate){
            const n=e.type==='boss'?5:e.type==='large'?3:1;
            for(let i=0;i<n;i++)state.items.push({x:e.x+(i-(n-1)/2)*15,y:e.y,vy:1.2});
          }
        }else if(e.type==='large'||e.type==='boss'){
          // hard enemy hit but not killed — light "tink" feedback (throttle to avoid stacking)
          playSE('hitHard',40);
        }
        break;
      }
    }
  }
  state.bullets=state.bullets.filter(b=>!b.dead);
  // items — once in range, magnetized permanently until collected
  state.items.forEach(it=>{
    const dx=state.player.x-it.x,dy=state.player.y-it.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<80)it.mag=true;
    if(it.mag&&dist>0){
      const pull=Math.min(6,(80/(dist+10))*3+1);
      it.x+=dx/dist*pull;
      it.y+=dy/dist*pull;
    }else{
      it.y+=it.vy;
    }
  });
  for(const it of state.items){
    if(it.dead)continue;
    const dx=it.x-state.player.x,dy=it.y-state.player.y;
    if(dx*dx+dy*dy<(8+state.player.r)*(8+state.player.r)){
      const gaugeBefore=state.gauge;
      it.dead=true;state.gauge=Math.min(208,state.gauge+8);
      const li=Math.min(2,(state.gauge>=99?2:state.gauge>=35?1:0));
      const pts=SCORE_ITEM[li];
      addScore(pts);
      const pc=['#8ab','#6cf','#fd4'][li];
      state.popups.push({x:it.x,y:it.y-10,text:'+'+pts,life:45,color:pc,size:li===2?16:13});
      // SE: level up first (overrides item), else normal item pickup
      if((gaugeBefore<35&&state.gauge>=35)||(gaugeBefore<99&&state.gauge>=99)) playSE('levelUp');
      else playSE('item',30);
    }
  }
  state.items=state.items.filter(it=>!it.dead&&it.y<H+10);
  // enemy bullets
  state.eBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  state.eBullets=state.eBullets.filter(b=>b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
  // collision: enemy body = death
  for(const e of state.enemies){
    if(e.dead)continue;
    const er=(e.type==='large'||e.type==='boss')?e.r*(0.5+0.5*e.hp/e.maxHp):e.r;
    const dx=e.x-state.player.x,dy=e.y-state.player.y;
    if(dx*dx+dy*dy<(er+state.player.r)*(er+state.player.r)){
      state.over=true;saveHi();playSE('playerDeath'); // 死亡瞬間。ゲームオーバーSEは表記出現時
      spawnParticles(state.player.x,state.player.y,120,'#9ee6ff',15);
      spawnParticles(state.player.x,state.player.y,80,'#fff',10);
      spawnParticles(state.player.x,state.player.y,40,'#ffd45c',8);
      spawnRing(state.player.x,state.player.y,'#9ee6ff',100,40);
      spawnRing(state.player.x,state.player.y,'#fff',60,24);
      shake(16);
      state.hitstop=35;state.hitFlash=15;
      break;
    }
  }
  // collision: enemy bullet = shield or death (with brief invincibility)
  if(state.invincible>0)state.invincible--;
  if(state.invincible<=0){
    for(const b of state.eBullets){
      if(b.dead)continue;
      const dx=b.x-state.player.x,dy=b.y-state.player.y;
      if(dx*dx+dy*dy<(b.r+state.player.r)*(b.r+state.player.r)){
        b.dead=true;
        if(state.gauge<=0){
          state.over=true;saveHi();playSE('playerDeath'); // 同上
          spawnParticles(state.player.x,state.player.y,120,'#ff4444',15);
          spawnParticles(state.player.x,state.player.y,80,'#fff',10);
          spawnParticles(state.player.x,state.player.y,40,'#ffd45c',8);
          spawnRing(state.player.x,state.player.y,'#ff4444',100,40);
          spawnRing(state.player.x,state.player.y,'#fff',60,24);
          shake(18);
          state.hitstop=35;state.hitFlash=15;
        }else{
          if(state.gauge>=99)state.gauge=35;
          else state.gauge=0;
          state.hitFlash=15;
          state.invincible=18;
          playSE('damage');
          spawnParticles(state.player.x,state.player.y,12,'#ffaa44',3);
          spawnRing(state.player.x,state.player.y,'#ffaa44',32,16);
          shake(4);
          state.hitstop=8;
        }
        break;
      }
    }
  }
  state.eBullets=state.eBullets.filter(b=>!b.dead);
  if(state.hitFlash>0)state.hitFlash--;
  draw();
}

// rank row drawer: arcade style — rank left, score center-left, name center-right
function drawRankRows(rows,startIdx,y,myName,myGlobalIdx){
  const lx=W/2-120,sx=W/2-50,nx=W/2+50;
  for(let i=0;i<rows.length;i++){
    const globalIdx=startIdx+i;
    const isMe=globalIdx===myGlobalIdx||rows[i].name===myName;
    ctx.fillStyle=isMe?'#ffd45c':'#99a';
    ctx.font=(isMe?'bold ':'')+'11px system-ui';
    ctx.textAlign='right';
    ctx.fillText((globalIdx+1)+'.',lx,y);
    ctx.textAlign='right';
    ctx.fillText(''+rows[i].score,sx+50,y);
    ctx.textAlign='left';
    ctx.fillText(rows[i].name,nx,y);
    y+=13;
  }
  ctx.textAlign='center';
  return y;
}

// retry prompt — appears from nothing with yellow glow burst, then settles into permanent yellow
// works for both paths: (a) over→retry-lock expires, (b) high-score→submit→ranking-loaded
// animation starts on FIRST frame the prompt is visible (latched in state.retryShownT)
function drawRetryPrompt(ry){
  // hide entirely during initial retry lock for game over (let player read score)
  if(state.over&&state.overTimer<RETRY_UNLOCK_FRAMES)return;
  // latch first visible frame — same fade-in regardless of path
  if(state.retryShownT===undefined)state.retryShownT=state.t;
  const since=state.t-state.retryShownT;
  const fadeIn=Math.min(1,since/22);                // 22F fade-in (alpha 0→1)
  const glow=Math.max(0,1-since/70);                // 70F glow burst decay (then steady)
  ctx.textAlign='center';
  ctx.globalAlpha=fadeIn;
  if(glow>0){
    ctx.shadowColor=`rgba(255,212,92,${glow*0.85})`;
    ctx.shadowBlur=12*glow;
  }
  ctx.fillStyle='#ffd45c';                          // permanent yellow (always highlight)
  ctx.font='bold 13px system-ui';                   // permanent bold
  ctx.fillText('SPACE to retry',W/2,ry);
  ctx.shadowBlur=0;
  ctx.shadowColor='transparent';
  ctx.globalAlpha=1;
  ctx.font='12px system-ui';
}

function draw(){
  const bg=state.bombFlash>20?'#eef8ff':state.bombFlash>10?'#8899bb':state.hitFlash>12?'#300818':'#07091a';
  // shake offset (excluded from UI overlay later via restore)
  ctx.save();
  if(state.shake>0.3){
    const sx=(Math.random()*2-1)*state.shake;
    const sy=(Math.random()*2-1)*state.shake;
    ctx.translate(sx,sy);
  }
  ctx.fillStyle=bg;ctx.fillRect(-20,-20,W+40,H+40);
  // starfield — 6 parallax layers
  const starAlpha=[0.08,0.12,0.2,0.3,0.45,0.7];
  const starSize=[1,1,1,1.5,2,2.5];
  state.stars.forEach(s=>{
    ctx.fillStyle=`rgba(180,200,255,${starAlpha[s.layer]})`;
    ctx.fillRect(s.x,s.y,starSize[s.layer],starSize[s.layer]);
  });
  // gauge
  const gw=Math.floor((W-40)*state.gauge/208);
  ctx.fillStyle='#1a2238';ctx.fillRect(20,12,W-40,8);
  const lvl=state.gauge>=99?3:state.gauge>=35?2:1;
  const maxed=state.gauge>=208;
  const gc=maxed?(state.t%20<10?'#fff':'#ffd45c'):lvl===3?'#ffd45c':lvl===2?'#7ad0ff':'#5a7aa8';
  ctx.fillStyle=gc;ctx.fillRect(20,12,gw,8);
  ctx.fillStyle='#3b4868';
  ctx.fillRect(20+(W-40)*(35/208),10,1,12);ctx.fillRect(20+(W-40)*(99/208),10,1,12);
  // HUD
  ctx.fillStyle='#cfd4e4';ctx.font='12px system-ui';
  const bombLabel=maxed?' BOMB[SPACE]':'';
  ctx.fillText(state.score+' pts'+bombLabel,20,38);
  ctx.fillStyle='#7a8aa8';
  ctx.fillText('HI '+hiScore,W-100,38);
  if(AI_MODE){ctx.fillStyle='#4a6';ctx.fillText('AI:EXPERT',20,54);}
  // player bullets — additive glow + trail
  ctx.globalCompositeOperation='lighter';
  state.bullets.forEach(b=>{
    // outer glow halo
    ctx.fillStyle='rgba(255,180,80,0.35)';
    ctx.fillRect(b.x-3,b.y-12,6,16);
    // trail
    ctx.fillStyle='rgba(255,200,90,0.6)';
    ctx.fillRect(b.x-1.5,b.y-2,3,14);
    // bright head
    ctx.fillStyle='#fff8d0';ctx.fillRect(b.x-1,b.y-7,2,5);
  });
  ctx.globalCompositeOperation='source-over';
  // items — pulsing glow, larger
  ctx.globalCompositeOperation='lighter';
  state.items.forEach(it=>{
    const pulse=0.7+0.3*Math.sin(state.t*0.12);
    const outerR=6+pulse*2;
    ctx.fillStyle=`rgba(60,120,220,${0.35*pulse})`;
    ctx.beginPath();ctx.arc(it.x,it.y,outerR+6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(80,170,255,${0.7*pulse})`;
    ctx.beginPath();ctx.arc(it.x,it.y,outerR,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d0eaff';
    ctx.beginPath();ctx.arc(it.x,it.y,3,0,Math.PI*2);ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';
  // enemies
  state.enemies.forEach(e=>{
    const er=(e.type==='large'||e.type==='boss')?e.r*(0.5+0.5*e.hp/e.maxHp):e.r;
    if(e.type==='large'){
      // hexagon body + counter-rotating inner triangle
      const rot=state.t*0.020;
      ctx.fillStyle=e.flash>0?'#fff':e.color;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=rot+i*Math.PI/3;
        const px=e.x+Math.cos(a)*er,py=e.y+Math.sin(a)*er;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle=e.flash>0?'#fff':'#0a584c';
      ctx.beginPath();
      for(let i=0;i<3;i++){
        const a=-rot*1.6+i*Math.PI*2/3;
        const px=e.x+Math.cos(a)*er*0.5,py=e.y+Math.sin(a)*er*0.5;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fill();
    }else if(e.type==='boss'){
      // gear-spike outer ring + octagonal body + bright core
      const rot=state.t*0.012;
      ctx.fillStyle=e.flash>0?'#fff':'#a02080';
      ctx.beginPath();
      for(let i=0;i<16;i++){
        const a=rot+i*Math.PI/8;
        const r2=(i%2===0)?er*1.12:er*0.92;
        const px=e.x+Math.cos(a)*r2,py=e.y+Math.sin(a)*r2;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle=e.flash>0?'#fff':e.color;
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const a=-rot*0.6+i*Math.PI/4+Math.PI/8;
        const px=e.x+Math.cos(a)*er*0.85,py=e.y+Math.sin(a)*er*0.85;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fill();
      ctx.fillStyle=e.flash>0?'#fff':'#5a0050';
      ctx.beginPath();ctx.arc(e.x,e.y,er*0.36,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=e.flash>0?'#fff':'#ffb0e8';
      ctx.beginPath();ctx.arc(e.x,e.y,er*0.18,0,Math.PI*2);ctx.fill();
      // HP bar
      const bw=Math.max(60,e.r*1.6),bh=5,bx=e.x-bw/2,by=e.y-er-12;
      ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff40c0';ctx.fillRect(bx,by,bw*e.hp/e.maxHp,bh);
    }else{
      // small/medium: simple circle
      ctx.fillStyle=e.flash>0?'#fff':e.color;
      ctx.beginPath();ctx.arc(e.x,e.y,er,0,Math.PI*2);ctx.fill();
    }
  });
  // enemy bullets — additive glow halo + solid core (kind:'large' = warm red, big)
  ctx.globalCompositeOperation='lighter';
  state.eBullets.forEach(b=>{
    ctx.fillStyle=b.kind==='large'?'rgba(255,140,60,0.4)':'rgba(255,80,100,0.35)';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r+4,0,Math.PI*2);ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';
  state.eBullets.forEach(b=>{
    ctx.fillStyle=b.kind==='large'?'#ff6030':'#ff3050';
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  });
  // bright core
  state.eBullets.forEach(b=>{
    ctx.fillStyle=b.kind==='large'?'#ffe0a0':'#ffd0d8';
    ctx.beginPath();ctx.arc(b.x,b.y,Math.max(1,b.r-2),0,Math.PI*2);ctx.fill();
  });
  // shockwave rings
  ctx.globalCompositeOperation='lighter';
  state.rings.forEach(r=>{
    const a=r.life/r.maxLife;
    ctx.strokeStyle=r.color;
    ctx.globalAlpha=a*0.9;
    ctx.lineWidth=Math.max(1,3*a);
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
  });
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  // player + shield
  const px=state.player.x,py=state.player.y,pr=state.player.r;
  const bombPulse=maxed?0.5+0.5*Math.sin(state.t*0.15):0;
  if(state.gauge>0){
    const sa=maxed?0.3+bombPulse*0.4:Math.min(0.5,state.gauge/208*0.5+0.1);
    const sr=pr+4+state.gauge/208*8;
    // additive halo
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=maxed?`rgba(255,220,100,${sa*0.5})`:`rgba(120,200,255,${sa*0.45})`;
    ctx.beginPath();ctx.arc(px,py,sr+5,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle=maxed?`rgba(255,220,100,${sa})`:`rgba(120,200,255,${sa})`;
    ctx.lineWidth=maxed?3:2;
    ctx.beginPath();ctx.arc(px,py,sr,0,Math.PI*2);ctx.stroke();
  }
  // player — hidden when game over
  if(!state.over){
    const baseColor=state.gauge<=0?'#ff4444':'#9ee6ff';
    const inv=state.invincible>0;
    if(state.mercyGlow>0){
      // soft cyan halo signaling close-range mercy was just applied
      const mg=state.mercyGlow/18;
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle=`rgba(127,223,255,${0.30*mg})`;
      ctx.beginPath();ctx.arc(px,py,pr+9,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(180,240,255,${0.18*mg})`;
      ctx.beginPath();ctx.arc(px,py,pr+15,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation='source-over';
    }
    if(maxed){
      const glow=bombPulse*0.15;
      ctx.fillStyle=`rgba(255,240,180,${glow})`;
      ctx.beginPath();ctx.arc(px,py,pr+6,0,Math.PI*2);ctx.fill();
    }
    if(!inv||state.t%6<3){
      ctx.fillStyle=inv?'#fff':baseColor;
      ctx.beginPath();ctx.moveTo(px,py-pr);ctx.lineTo(px-pr,py+pr);ctx.lineTo(px+pr,py+pr);
      ctx.closePath();ctx.fill();
    }
  }
  // particles — additive glow
  ctx.globalCompositeOperation='lighter';
  state.particles.forEach(p=>{
    const a=Math.min(1,p.life/15);
    ctx.fillStyle=p.color.startsWith('rgba')?p.color:`rgba(${parseInt(p.color.slice(1,3),16)},${parseInt(p.color.slice(3,5),16)},${parseInt(p.color.slice(5,7),16)},${a})`;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  });
  ctx.globalCompositeOperation='source-over';
  // score popups
  state.popups.forEach(p=>{
    const a=Math.min(1,p.life/20);
    ctx.fillStyle=p.color;ctx.globalAlpha=a;
    ctx.font=`bold ${p.size||13}px system-ui`;ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
    ctx.textAlign='left';ctx.globalAlpha=1;
  });
  // restore: end shake scope before drawing UI overlays (text/title/gameover)
  ctx.restore();
  // gauge MAX flash — tiny yellow screen overlay (一瞬)
  if(state.maxFlash>0){
    const a=(state.maxFlash/18)*0.18;
    ctx.fillStyle=`rgba(255,224,140,${a})`;
    ctx.fillRect(0,0,W,H);
  }
  // BOMB READY notification — big center text on first MAX
  // gauge>=208 必須: ダメージで権利を失った瞬間に消す（押しても発動しない理不尽の防止）
  if(state.bombReady>0&&state.gauge>=208&&!state.over){
    const a=Math.min(1,state.bombReady/30);
    ctx.fillStyle=`rgba(255,255,200,${a*0.9})`;
    ctx.font='bold 24px system-ui';ctx.textAlign='center';
    ctx.fillText('BOMB READY!',W/2,H/2-20);
    ctx.font='16px system-ui';
    ctx.fillStyle=`rgba(200,220,255,${a*0.8})`;
    ctx.fillText('SPACE to fire',W/2,H/2+10);
    ctx.textAlign='left';
  }
  if(!state.started){
    // TOP10 above center
    ctx.textAlign='center';
    if(rankData&&rankData.length>0){
      let ty=H/2-65-Math.min(rankData.length,10)*13;
      ctx.fillStyle='#8af';ctx.font='bold 11px system-ui';
      ctx.fillText('— TOP 10 —',W/2,ty);ty+=14;
      drawRankRows(rankData.slice(0,10),0,ty,rankName,-1);
    }
    // center bar
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,H/2-50,W,100);
    ctx.fillStyle='#fff';ctx.font='20px system-ui';
    ctx.fillText('BACKLASH',W/2,H/2-16);
    ctx.font='14px system-ui';ctx.fillStyle='#aac';
    ctx.fillText('← → ↑ ↓  MOVE  /  SPACE  BOMB',W/2,H/2+10);
    ctx.fillStyle=state.t%40<20?'#ffd':'#aa8';
    ctx.fillText('SPACE to start',W/2,H/2+34);
    // own rank below center
    if(rankData&&rankName){
      let myIdx=-1;
      for(let i=0;i<rankData.length;i++){if(rankData[i].name===rankName){myIdx=i;break;}}
      if(myIdx>=0){
        let by=H/2+64;
        const start=Math.max(0,myIdx-2),end=Math.min(rankData.length,myIdx+3);
        ctx.fillStyle='#8af';ctx.font='bold 11px system-ui';
        ctx.fillText('— YOUR RANK —',W/2,by);by+=14;
        drawRankRows(rankData.slice(start,end),start,by,rankName,myIdx);
      }
    }
    ctx.textAlign='left';
  }else if(state.cleared||state.over&&state.overTimer>=120){
    const title=state.cleared?'STAGE CLEAR!':'GAME OVER';
    const tc=state.cleared?'#ffd45c':'#fff';
    // background
    const rh=rankData?Math.min(rankData.length,20)*14+100:100;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,H/2-60,W,rh+50);
    ctx.textAlign='center';
    // title + score
    ctx.fillStyle=tc;ctx.font='bold 20px system-ui';
    ctx.fillText(title,W/2,H/2-38);
    ctx.fillStyle='#fff';ctx.font='16px system-ui';
    ctx.fillText(state.score+' pts',W/2,H/2-16);
    // submit prompt or ranking
    const isNewHi=state.score>=hiScore&&state.score>0;
    if(!state.submitted&&isNewHi){
      // NEW HIGH SCORE — name entry
      ctx.fillStyle='#ffd45c';ctx.font='bold 13px system-ui';
      ctx.fillText('NEW HIGH SCORE!',W/2,H/2+2);
      const bw=180,bh=24,bx=W/2-bw/2,by=H/2+8;
      ctx.strokeStyle='#556';ctx.lineWidth=1;
      ctx.strokeRect(bx,by,bw,bh);
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(bx,by,bw,bh);
      // name text or placeholder
      const showPlaceholder=!state.nameEditing;
      const displayName=showPlaceholder?(rankName||'ENTER YOUR NAME'):(state.nameInput||'');
      ctx.fillStyle=showPlaceholder?'#ffd45c':'#fff';
      ctx.font=(showPlaceholder?'':'bold ')+'14px system-ui';
      // cursor blink
      const cursor=(!showPlaceholder&&state.t%40<25)?'|':'';
      ctx.fillText(displayName+cursor,W/2,by+17);
      // hint
      ctx.fillStyle='#ccd';ctx.font='10px system-ui';
      ctx.fillText('ENTER to save',W/2,by+bh+14);
    }else if(!state.submitted&&!isNewHi){
      // not a new high score — show cached ranking + quick retry
      const myName=rankName||'';
      let ry=H/2+2;
      if(rankData&&rankData.length>0){
        let myRank=-1;
        for(let i=0;i<rankData.length;i++){if(rankData[i].name===myName){myRank=i;break;}}
        ctx.fillStyle='#8af';ctx.font='bold 12px system-ui';
        ctx.fillText('— TOP 10 —',W/2,ry);ry+=16;
        ry=drawRankRows(rankData.slice(0,10),0,ry,myName,myRank);
        if(myRank>=10){
          ry+=10;ctx.fillStyle='#8af';ctx.font='bold 12px system-ui';
          ctx.fillText('— YOUR RANK —',W/2,ry);ry+=16;
          const start=Math.max(10,myRank-2),end=Math.min(rankData.length,myRank+3);
          ry=drawRankRows(rankData.slice(start,end),start,ry,myName,myRank);
        }
      }
      ry+=8;drawRetryPrompt(ry);
    }else{
      const myName=state.nameInput||rankName;
      let ry=H/2+2;
      if(rankSaving||!rankLoaded){
        // saving/loading state — fixed-position base text + three dots with phased alpha
        // 位置は完全固定（2026-04-26: ガクガク禁止）／3点のドットは sin 位相ずらしで波打たせる
        // （2026-04-27: ...アニメは残す — 待ち時間の重要シグナル）
        ctx.font='13px system-ui';
        const baseText=rankSaving?'Saving':'Loading';
        const baseW=ctx.measureText(baseText).width;
        const dotW=ctx.measureText('.').width;
        const totalW=baseW+dotW*3;
        const baseX=W/2-totalW/2;
        ctx.fillStyle='#aac';
        ctx.textAlign='left';
        ctx.fillText(baseText,baseX,ry);
        for(let i=0;i<3;i++){
          const a=0.20+0.80*(0.5+0.5*Math.sin(state.t*0.18-i*0.9));
          ctx.fillStyle=`rgba(170,170,204,${a})`;
          ctx.fillText('.',baseX+baseW+dotW*i,ry);
        }
        ctx.textAlign='center';
      }else if(rankData&&rankData.length>0){
        let myRank=-1;
        for(let i=0;i<rankData.length;i++){
          if(rankData[i].name===myName){myRank=i;break;}
        }
        ctx.fillStyle='#8af';ctx.font='bold 12px system-ui';
        ctx.fillText('— TOP 10 —',W/2,ry);ry+=16;
        ry=drawRankRows(rankData.slice(0,10),0,ry,myName,myRank);
        if(myRank>=10){
          ry+=10;
          ctx.fillStyle='#8af';ctx.font='bold 12px system-ui';
          ctx.fillText('— YOUR RANK —',W/2,ry);ry+=16;
          const start=Math.max(10,myRank-2),end=Math.min(rankData.length,myRank+3);
          ry=drawRankRows(rankData.slice(start,end),start,ry,myName,myRank);
        }
        if(myRank===-1&&myName){
          ry+=6;ctx.fillStyle='#ffd45c';ctx.font='bold 11px system-ui';
          ctx.fillText('You: '+myName+'  '+state.score,W/2,ry);ry+=14;
        }
        ry+=8;drawRetryPrompt(ry);
      }else{
        // no data or empty
        drawRetryPrompt(ry);
      }
    }
    ctx.textAlign='left';
  }
}
// name input handler
addEventListener('keydown',e=>{
  if(!(state.over||state.cleared)||state.submitted)return;
  if(e.repeat)return; // ゲームオーバー遷移時に押しっぱなしのキーがautoリピートで流入する事故を防ぐ
  if(e.key==='Enter'){
    // submit: use typed name, or fallback to previous name, or generate default
    let name=state.nameEditing?state.nameInput:(rankName||'');
    if(!name){const adj=['ACE','NEO','SKY','ZAP','JET','ARC','ION','RAY'];const n=adj[Math.floor(Math.random()*adj.length)]+'-'+Math.floor(Math.random()*900+100);name=n;}
    state.nameInput=name;state.submitted=true;submitScore(name,state.score);
    return;
  }
  if(e.key==='Backspace'){
    if(state.nameEditing){state.nameInput=state.nameInput.slice(0,-1);if(state.nameInput.length===0){state.nameEditing=false;rankName='';}}
    return;
  }
  if(e.key.length===1&&e.key!==' '){
    if(!state.nameEditing){state.nameInput='';state.nameEditing=true;} // first char clears placeholder
    if(state.nameInput.length<12)state.nameInput+=e.key;
  }
});
setInterval(step,1000/60);
</script>
